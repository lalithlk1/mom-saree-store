<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | Royal Threads</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Lato', sans-serif; background-color: #fafafa; color: #333; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 2rem 5%; background-color: #fff; border-bottom: 1px solid #eaeaea; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 600; color: #1a1a1a; text-decoration: none; }
        nav a { margin-left: 2rem; text-decoration: none; color: #555; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; }

        .gallery-container { padding: 5% 5%; max-width: 1200px; margin: 0 auto; }
        .gallery-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; text-align: center; margin-bottom: 3rem; }

        #product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .product-card { background: #fff; padding: 1.5rem; border: 1px solid #eaeaea; text-align: center; transition: transform 0.2s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .product-image { width: 100%; height: 400px; object-fit: cover; margin-bottom: 1rem; border-radius: 2px; }
        .product-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 0.5rem; }
        .product-price { color: #666; margin-bottom: 1.5rem; font-weight: bold; }

        .whatsapp-btn {
            display: block;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            padding: 0.8rem;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .whatsapp-btn:hover { background-color: #128C7E; }
        .loading-text { text-align: center; font-size: 1.2rem; color: #999; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Royal Threads</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="gallery.html">Collections</a>
        </nav>
    </header>

    <main class="gallery-container">
        <h1 class="gallery-title">Our Curated Collection</h1>
        <div id="product-grid"><p class="loading-text">Loading the latest collection...</p></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/contentful@latest/dist/contentful.browser.min.js"></script>

    <script>
        // 1. CONFIGURATION
        const SPACE_ID = '5svkjynn7cgu'; 
        const ACCESS_TOKEN = 'zq4KTlyONPdhOJVm_ELPHU_JWGoayp1GAv79XOw61dM';
        const MOM_WHATSAPP = '919884003568';

        // 2. INITIALIZE THE CLIENT
        const client = contentful.createClient({
            space: SPACE_ID,
            accessToken: ACCESS_TOKEN
        });

        async function fetchAndDisplaySarees() {
            const grid = document.getElementById('product-grid');
            
            try {
                const response = await client.getEntries({ 
                    content_type: 'saree',
                    order: '-sys.createdAt' 
                });

                grid.innerHTML = ''; 

                response.items.forEach(item => {
                    const fields = item.fields;
                    
                    const name = fields.sareeName;      
                    const price = fields.productPrice;  
                    const images = fields.productImage; 
                    
                    const imageUrl = images && images[0] 
                                     ? images[0].fields.file.url 
                                     : 'https://via.placeholder.com/400x600?text=No+Image';

                    const message = `Hi! I want to buy the ${name} (₹${price})`;
                    const encodedMessage = encodeURIComponent(message);
                    const whatsappUrl = `https://wa.me/${MOM_WHATSAPP}?text=${encodedMessage}`;

                    const productCard = `
                        <div class="product-card" onclick="location.href='product.html?id=${item.sys.id}'" style="cursor: pointer;">
                            <img src="https:${imageUrl}" class="product-image" alt="${name}">
                            <h2 class="product-name">${name}</h2>
                            <p class="product-price">₹${price}</p>
                            <a href="${whatsappUrl}" target="_blank" class="whatsapp-btn">
                                Order on WhatsApp
                            </a>
                        </div>
                    `;
                    
                    grid.innerHTML += productCard;
                });

            } catch (error) {
                console.error("Contentful Error:", error);
                grid.innerHTML = '<p class="loading-text">Error loading sarees. Check console.</p>';
            }
        }

        fetchAndDisplaySarees();
    </script>
</body>
</html>
